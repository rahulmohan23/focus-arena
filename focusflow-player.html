<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FocusFlow — Music Player</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    /* ─── Reset & Base ─────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:          #0d0f14;
      --surface:     rgba(255, 255, 255, 0.055);
      --border:      rgba(255, 255, 255, 0.08);
      --text:        #e8e4dc;
      --muted:       rgba(232, 228, 220, 0.45);
      --accent:      #c8a96e;
      --accent-dim:  rgba(200, 169, 110, 0.18);
      --progress-bg: rgba(255,255,255,0.1);
      --radius:      16px;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--bg);
      font-family: 'DM Sans', sans-serif;
      color: var(--text);
      overflow: hidden;
    }

    /* ─── Ambient background blobs ─────────────────────────── */
    .bg-blobs {
      position: fixed; inset: 0; z-index: 0; pointer-events: none;
    }
    .blob {
      position: absolute;
      border-radius: 50%;
      filter: blur(90px);
      opacity: 0.18;
      animation: drift 18s ease-in-out infinite alternate;
    }
    .blob-1 { width: 500px; height: 500px; background: #4a6fa5; top: -120px; left: -100px; animation-duration: 20s; }
    .blob-2 { width: 400px; height: 400px; background: #8a6a3a; bottom: -80px; right: -60px; animation-duration: 16s; animation-delay: -6s; }
    .blob-3 { width: 300px; height: 300px; background: #3a5a4a; top: 40%; left: 45%; animation-duration: 24s; animation-delay: -10s; }

    @keyframes drift {
      from { transform: translate(0, 0) scale(1); }
      to   { transform: translate(40px, 30px) scale(1.06); }
    }

    /* ─── Autoplay gate overlay ─────────────────────────────── */
    #gate {
      position: fixed; inset: 0; z-index: 100;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      background: rgba(13, 15, 20, 0.92);
      backdrop-filter: blur(8px);
      gap: 20px;
      transition: opacity 0.6s ease, visibility 0.6s ease;
    }
    #gate.hidden { opacity: 0; visibility: hidden; }
    #gate h2 {
      font-family: 'DM Serif Display', serif;
      font-size: 2rem;
      color: var(--text);
      letter-spacing: -0.02em;
    }
    #gate p { color: var(--muted); font-size: 0.9rem; }
    #gate-btn {
      margin-top: 8px;
      padding: 12px 32px;
      border-radius: 100px;
      border: 1px solid var(--accent);
      background: var(--accent-dim);
      color: var(--accent);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.95rem;
      font-weight: 500;
      cursor: pointer;
      letter-spacing: 0.04em;
      transition: background 0.2s, transform 0.15s;
    }
    #gate-btn:hover { background: rgba(200, 169, 110, 0.3); transform: scale(1.03); }

    /* ─── Player card ───────────────────────────────────────── */
    .player {
      position: relative; z-index: 10;
      width: 360px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 24px;
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      padding: 32px 28px 28px;
      box-shadow: 0 32px 80px rgba(0,0,0,0.5), 0 0 0 0.5px rgba(255,255,255,0.04);
    }

    /* ─── Track info ────────────────────────────────────────── */
    .track-meta {
      text-align: center;
      margin-bottom: 28px;
    }
    .track-label {
      font-size: 0.7rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 10px;
    }
    .track-name {
      font-family: 'DM Serif Display', serif;
      font-size: 1.45rem;
      line-height: 1.25;
      color: var(--text);
      letter-spacing: -0.01em;
      min-height: 2.5em;
      display: flex; align-items: center; justify-content: center;
      transition: opacity 0.3s ease;
    }
    .track-name.fading { opacity: 0; }
    .track-index {
      margin-top: 8px;
      font-size: 0.78rem;
      color: var(--muted);
    }

    /* ─── Progress bar ──────────────────────────────────────── */
    .progress-wrap {
      margin-bottom: 10px;
      cursor: pointer;
      position: relative;
    }
    .progress-track {
      height: 3px;
      border-radius: 2px;
      background: var(--progress-bg);
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      border-radius: 2px;
      background: linear-gradient(90deg, var(--accent), #e8c98a);
      width: 0%;
      transition: width 0.25s linear;
    }
    .time-row {
      display: flex; justify-content: space-between;
      font-size: 0.7rem;
      color: var(--muted);
      margin-top: 6px;
    }

    /* ─── Controls ──────────────────────────────────────────── */
    .controls {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 20px;
      margin: 20px 0 24px;
    }
    .ctrl-btn {
      background: none;
      border: none;
      cursor: pointer;
      color: var(--muted);
      display: flex; align-items: center; justify-content: center;
      border-radius: 50%;
      transition: color 0.2s, transform 0.15s, background 0.2s;
      padding: 8px;
    }
    .ctrl-btn:hover { color: var(--text); transform: scale(1.08); }
    .ctrl-btn svg { display: block; }

    .play-btn {
      width: 56px; height: 56px;
      background: var(--accent-dim);
      border: 1px solid rgba(200,169,110,0.3);
      color: var(--accent);
      border-radius: 50%;
      padding: 0;
    }
    .play-btn:hover {
      background: rgba(200,169,110,0.28);
      color: var(--text);
      transform: scale(1.06);
    }
    .play-btn svg { transition: opacity 0.15s; }

    /* ─── Volume ────────────────────────────────────────────── */
    .volume-row {
      display: flex; align-items: center; gap: 10px;
    }
    .volume-icon { color: var(--muted); flex-shrink: 0; }
    .volume-slider {
      flex: 1;
      -webkit-appearance: none;
      appearance: none;
      height: 3px;
      border-radius: 2px;
      background: var(--progress-bg);
      outline: none;
      cursor: pointer;
    }
    .volume-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 12px; height: 12px;
      border-radius: 50%;
      background: var(--accent);
      cursor: pointer;
      transition: transform 0.15s;
    }
    .volume-slider::-webkit-slider-thumb:hover { transform: scale(1.3); }

    /* ─── Track list ────────────────────────────────────────── */
    .track-list-toggle {
      display: flex; align-items: center; justify-content: center;
      gap: 6px;
      width: 100%; margin-top: 20px;
      background: none; border: none;
      color: var(--muted);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.78rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      cursor: pointer;
      padding: 6px;
      border-radius: 8px;
      transition: color 0.2s, background 0.2s;
    }
    .track-list-toggle:hover { color: var(--text); background: rgba(255,255,255,0.04); }
    .toggle-arrow { transition: transform 0.3s ease; }
    .toggle-arrow.open { transform: rotate(180deg); }

    .track-list {
      max-height: 0; overflow: hidden;
      transition: max-height 0.4s ease;
    }
    .track-list.open { max-height: 260px; }
    .track-list-inner {
      margin-top: 12px;
      display: flex; flex-direction: column; gap: 2px;
      overflow-y: auto;
      max-height: 240px;
      padding-right: 4px;
    }
    .track-list-inner::-webkit-scrollbar { width: 3px; }
    .track-list-inner::-webkit-scrollbar-track { background: transparent; }
    .track-list-inner::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .track-item {
      display: flex; align-items: center; gap: 12px;
      padding: 9px 12px;
      border-radius: 10px;
      cursor: pointer;
      transition: background 0.15s;
      border: 1px solid transparent;
    }
    .track-item:hover { background: rgba(255,255,255,0.05); }
    .track-item.active {
      background: var(--accent-dim);
      border-color: rgba(200,169,110,0.2);
    }
    .track-num {
      font-size: 0.7rem;
      color: var(--muted);
      width: 18px;
      text-align: right;
      flex-shrink: 0;
    }
    .track-item.active .track-num { color: var(--accent); }
    .track-item-name {
      font-size: 0.85rem;
      color: var(--muted);
      flex: 1;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .track-item.active .track-item-name { color: var(--text); }
    .playing-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--accent);
      flex-shrink: 0;
      opacity: 0;
      animation: pulse 1.4s ease-in-out infinite;
    }
    .track-item.active .playing-dot { opacity: 1; }
    @keyframes pulse {
      0%, 100% { transform: scale(1); opacity: 1; }
      50% { transform: scale(0.6); opacity: 0.5; }
    }

    /* ─── Divider ───────────────────────────────────────────── */
    .divider {
      height: 1px;
      background: var(--border);
      margin: 22px 0 0;
    }
  </style>
</head>
<body>

  <!-- Ambient background -->
  <div class="bg-blobs">
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>
  </div>

  <!-- Autoplay gate (browsers require user gesture to start audio) -->
  <div id="gate">
    <h2>FocusFlow</h2>
    <p>Lo-fi music for deep work</p>
    <button id="gate-btn">▶ &nbsp; Start Listening</button>
  </div>

  <!-- Player -->
  <div class="player">
    <div class="track-meta">
      <div class="track-label">Now playing</div>
      <div class="track-name" id="track-name">Track name</div>
      <div class="track-index" id="track-index">1 / 10</div>
    </div>

    <!-- Progress -->
    <div class="progress-wrap" id="progress-wrap">
      <div class="progress-track">
        <div class="progress-fill" id="progress-fill"></div>
      </div>
      <div class="time-row">
        <span id="time-current">0:00</span>
        <span id="time-total">0:00</span>
      </div>
    </div>

    <!-- Controls -->
    <div class="controls">
      <!-- Previous -->
      <button class="ctrl-btn" id="btn-prev" title="Previous">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polygon points="19 20 9 12 19 4 19 20"></polygon>
          <line x1="5" y1="19" x2="5" y2="5"></line>
        </svg>
      </button>
      <!-- Play / Pause -->
      <button class="ctrl-btn play-btn" id="btn-play" title="Play / Pause">
        <svg id="icon-play" width="22" height="22" viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"/></svg>
        <svg id="icon-pause" width="22" height="22" viewBox="0 0 24 24" fill="currentColor" style="display:none"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>
      </button>
      <!-- Next -->
      <button class="ctrl-btn" id="btn-next" title="Next">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polygon points="5 4 15 12 5 20 5 4"></polygon>
          <line x1="19" y1="5" x2="19" y2="19"></line>
        </svg>
      </button>
    </div>

    <!-- Volume -->
    <div class="volume-row">
      <svg class="volume-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon>
        <path d="M15.54 8.46a5 5 0 0 1 0 7.07"></path>
        <path d="M19.07 4.93a10 10 0 0 1 0 14.14"></path>
      </svg>
      <input class="volume-slider" type="range" id="volume" min="0" max="1" step="0.02" value="0.75" />
    </div>

    <div class="divider"></div>

    <!-- Track list toggle -->
    <button class="track-list-toggle" id="list-toggle">
      <span>Tracks</span>
      <svg class="toggle-arrow" id="toggle-arrow" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="6 9 12 15 18 9"></polyline>
      </svg>
    </button>

    <!-- Track list -->
    <div class="track-list" id="track-list">
      <div class="track-list-inner" id="track-list-inner"></div>
    </div>
  </div>

  <script>
    // ─────────────────────────────────────────────────────────────
    //  TRACKS CONFIG
    //  To add a new track:
    //    1. Drop the .mp3 file into the "Lo fi music" folder
    //    2. Add a new entry below: { file: "filename.mp3", name: "Display Name" }
    //  That's it — the player picks it up automatically.
    // ─────────────────────────────────────────────────────────────
    const TRACKS = [
      { file: "Focus flow 01.mp3", name: "Focus Flow 01" },
      { file: "Focus flow 02.mp3", name: "Focus Flow 02" },
      { file: "Focus flow 03.mp3", name: "Focus Flow 03" },
      { file: "Focus flow 04.mp3", name: "Focus Flow 04" },
      { file: "Focus flow 05.mp3", name: "Focus Flow 05" },
      { file: "Focus flow 06.mp3", name: "Focus Flow 06" },
      { file: "Focus flow 07.mp3", name: "Focus Flow 07" },
      { file: "Focus flow 08.mp3", name: "Focus Flow 08" },
      { file: "Focus flow 09.mp3", name: "Focus Flow 09" },
      { file: "Focus flow 10.mp3", name: "Focus Flow 10" },
    ];

    // ─── Base path (where the MP3 folder lives relative to this HTML file) ───
    const MUSIC_FOLDER = "Lo fi music/";

    // ─── State ────────────────────────────────────────────────────
    let currentIndex = 0;
    let isPlaying = false;

    // ─── Elements ─────────────────────────────────────────────────
    const audio         = new Audio();
    const gate          = document.getElementById('gate');
    const gateBtn       = document.getElementById('gate-btn');
    const trackName     = document.getElementById('track-name');
    const trackIndex    = document.getElementById('track-index');
    const progressFill  = document.getElementById('progress-fill');
    const progressWrap  = document.getElementById('progress-wrap');
    const timeCurrent   = document.getElementById('time-current');
    const timeTotal     = document.getElementById('time-total');
    const btnPlay       = document.getElementById('btn-play');
    const iconPlay      = document.getElementById('icon-play');
    const iconPause     = document.getElementById('icon-pause');
    const btnPrev       = document.getElementById('btn-prev');
    const btnNext       = document.getElementById('btn-next');
    const volumeSlider  = document.getElementById('volume');
    const listToggle    = document.getElementById('list-toggle');
    const trackListEl   = document.getElementById('track-list');
    const trackListInner= document.getElementById('track-list-inner');
    const toggleArrow   = document.getElementById('toggle-arrow');

    // ─── Helpers ──────────────────────────────────────────────────
    function formatTime(s) {
      if (isNaN(s)) return '0:00';
      const m = Math.floor(s / 60);
      const sec = Math.floor(s % 60);
      return `${m}:${sec.toString().padStart(2, '0')}`;
    }

    // ─── Load track ───────────────────────────────────────────────
    function loadTrack(index, autoPlay = false) {
      const track = TRACKS[index];
      audio.src = MUSIC_FOLDER + track.file;
      audio.load();

      // Animate name change
      trackName.classList.add('fading');
      setTimeout(() => {
        trackName.textContent = track.name;
        trackName.classList.remove('fading');
      }, 300);

      trackIndex.textContent = `${index + 1} / ${TRACKS.length}`;
      progressFill.style.width = '0%';
      timeCurrent.textContent = '0:00';
      timeTotal.textContent = '0:00';

      updateTrackList();

      if (autoPlay) {
        audio.play().then(() => setPlaying(true)).catch(() => setPlaying(false));
      } else {
        setPlaying(false);
      }
    }

    function setPlaying(playing) {
      isPlaying = playing;
      iconPlay.style.display  = playing ? 'none'  : 'block';
      iconPause.style.display = playing ? 'block' : 'none';
    }

    // ─── Controls ─────────────────────────────────────────────────
    btnPlay.addEventListener('click', () => {
      if (isPlaying) {
        audio.pause();
        setPlaying(false);
      } else {
        audio.play().then(() => setPlaying(true));
      }
    });

    btnNext.addEventListener('click', () => {
      currentIndex = (currentIndex + 1) % TRACKS.length;
      loadTrack(currentIndex, isPlaying);
    });

    btnPrev.addEventListener('click', () => {
      // If more than 3s in, restart current track; else go to previous
      if (audio.currentTime > 3) {
        audio.currentTime = 0;
      } else {
        currentIndex = (currentIndex - 1 + TRACKS.length) % TRACKS.length;
        loadTrack(currentIndex, isPlaying);
      }
    });

    // Auto-advance to next track
    audio.addEventListener('ended', () => {
      currentIndex = (currentIndex + 1) % TRACKS.length;
      loadTrack(currentIndex, true);
    });

    // ─── Progress ─────────────────────────────────────────────────
    audio.addEventListener('timeupdate', () => {
      if (!audio.duration) return;
      const pct = (audio.currentTime / audio.duration) * 100;
      progressFill.style.width = pct + '%';
      timeCurrent.textContent = formatTime(audio.currentTime);
    });

    audio.addEventListener('loadedmetadata', () => {
      timeTotal.textContent = formatTime(audio.duration);
    });

    progressWrap.addEventListener('click', (e) => {
      const rect = progressWrap.getBoundingClientRect();
      const pct = (e.clientX - rect.left) / rect.width;
      audio.currentTime = pct * audio.duration;
    });

    // ─── Volume ───────────────────────────────────────────────────
    audio.volume = parseFloat(volumeSlider.value);
    volumeSlider.addEventListener('input', () => {
      audio.volume = parseFloat(volumeSlider.value);
    });

    // ─── Track list ───────────────────────────────────────────────
    function buildTrackList() {
      trackListInner.innerHTML = '';
      TRACKS.forEach((t, i) => {
        const item = document.createElement('div');
        item.className = 'track-item' + (i === currentIndex ? ' active' : '');
        item.innerHTML = `
          <span class="track-num">${String(i + 1).padStart(2, '0')}</span>
          <span class="track-item-name">${t.name}</span>
          <span class="playing-dot"></span>
        `;
        item.addEventListener('click', () => {
          currentIndex = i;
          loadTrack(currentIndex, true);
        });
        trackListInner.appendChild(item);
      });
    }

    function updateTrackList() {
      document.querySelectorAll('.track-item').forEach((el, i) => {
        el.classList.toggle('active', i === currentIndex);
      });
    }

    listToggle.addEventListener('click', () => {
      const open = trackListEl.classList.toggle('open');
      toggleArrow.classList.toggle('open', open);
    });

    // ─── Autoplay gate ────────────────────────────────────────────
    gateBtn.addEventListener('click', () => {
      gate.classList.add('hidden');
      audio.play().then(() => setPlaying(true));
    });

    // Try silent autoplay — if browser allows it, skip the gate
    audio.volume = parseFloat(volumeSlider.value);
    const silentTest = audio.play();
    if (silentTest !== undefined) {
      silentTest.then(() => {
        gate.classList.add('hidden');
        setPlaying(true);
      }).catch(() => {
        // Browser blocked autoplay — gate stays visible, user clicks to start
      });
    }

    // ─── Init ─────────────────────────────────────────────────────
    buildTrackList();
    loadTrack(0, false);
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Focus Flow</title>
  <link rel="icon" type="image/png" href="icon/Favicon.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Doto:wght@400;600&family=Inter:wght@400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --spacing-s:   8px;
      --spacing-m:  12px;
      --spacing-lg: 16px;
      --spacing-xl: 20px;
      --colour-white:     #ffffff;
      --colour-black:     #313131;
      --colour-grey-100:  #f3f4f6;
      --colour-grey-600:  #4b5563;
      --glass-bg:     rgba(0, 0, 0, 0.2);
      --glass-border: rgba(255, 255, 255, 0.3);
      --font-doto:      'Doto', monospace;
      --font-helvetica: 'Helvetica Neue', Helvetica, Arial, sans-serif;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #0a1628;
    }

    /* ── App shell ── */
    #app {
      position: relative;
      width: 100%;
      height: 100vh;
      overflow: hidden;
    }

    /* ── Background scene ── */
    .scene-bg {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      pointer-events: none;
      display: block;
      transition: opacity 0.6s ease;
    }
    /* Both video layers start hidden; active-video fades one in */
    .scene-video { opacity: 0; }
    .scene-video.active-video { opacity: 1; }

    /* ══════════════════════════════════
       HEADER
    ══════════════════════════════════ */
    .header {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      z-index: 10;
      display: flex;
      align-items: center;
      padding: var(--spacing-xl) 40px;
      backdrop-filter: blur(2px);
      background: rgba(0, 0, 0, 0.2);
      border-bottom: 1px solid rgba(255, 255, 255, 0.2);
    }
    /* Lift above sticky note when menu is open */
    .header.menu-open { z-index: 25; }

    .navbar {
      display: flex;
      flex: 1;
      align-items: center;
      justify-content: space-between;
      min-width: 0;
    }

    .logo {
      font-family: var(--font-doto);
      font-weight: 600;
      font-size: 16px;
      color: var(--colour-white);
      white-space: nowrap;
      flex-shrink: 0;
    }

    /* Scene nav — hidden on mobile */
    .scene-nav {
      display: flex;
      gap: var(--spacing-xl);
      align-items: center;
      font-family: var(--font-doto);
      font-weight: 600;
      font-size: 16px;
      color: var(--colour-white);
      white-space: nowrap;
      flex-shrink: 0;
    }

    .scene-nav span {
      opacity: 0.4;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    .scene-nav span:hover  { opacity: 0.7; }
    .scene-nav span.active { opacity: 1; }

    /* ── Menu button — mobile only ── */
    .menu-btn {
      display: none;
      align-items: center;
      justify-content: center;
      padding: var(--spacing-m);
      backdrop-filter: blur(12px);
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      border-radius: 999px;
      cursor: pointer;
      flex-shrink: 0;
      transition: background 0.2s;
    }
    .menu-btn:hover { background: rgba(255, 255, 255, 0.1); }

    /* Menu icon states */
    .menu-icon-default { display: flex; align-items: center; }
    .menu-icon-open    { display: none;  align-items: center; }
    .header.menu-open .menu-icon-default { display: none; }
    .header.menu-open .menu-icon-open    { display: flex; }

    /* ── Mobile scene panel — edge-to-edge, no border-radius ── */
    .mobile-menu {
      display: none;
      position: absolute;
      top: 100%;
      left: 0;
      right: 0;
      z-index: 50;
      flex-direction: column;
      gap: var(--spacing-lg);
      padding: 24px;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      background: rgba(0, 0, 0, 0.2);
      border: 1px solid rgba(255, 255, 255, 0.2);
    }

    /* Scene items inside mobile menu */
    .mobile-menu [data-scene] {
      font-family: var(--font-doto);
      font-size: var(--spacing-lg);
      font-weight: 600;
      color: var(--colour-white);
      cursor: pointer;
      opacity: 0.4;
      transition: opacity 0.15s;
      width: 100%;
    }
    .mobile-menu [data-scene]:hover  { opacity: 0.7; }
    .mobile-menu [data-scene].active { opacity: 1; }

    /* ══════════════════════════════════
       SHARED COMPONENT STYLES
    ══════════════════════════════════ */
    .pill-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: var(--spacing-m) var(--spacing-xl);
      backdrop-filter: blur(12px);
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      border-radius: 999px;
      font-family: var(--font-doto);
      font-weight: 400;
      font-size: 12px;
      color: var(--colour-white);
      white-space: nowrap;
      cursor: pointer;
      transition: background 0.2s;
    }
    .pill-btn:hover { background: rgba(255, 255, 255, 0.1); }

    /* Icon button (timer / sound) */
    .icon-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: var(--spacing-m);
      backdrop-filter: blur(12px);
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      border-radius: 999px;
      cursor: pointer;
      flex-shrink: 0;
      transition: background 0.2s;
    }
    .icon-btn:hover { background: rgba(255, 255, 255, 0.1); }

    /* Timer button — 52×52 circle, matches player height */
    .timer-btn { padding: 16px; }

    /* Sound button — 52×52 circle, reveals upward on click */
    .sound-btn {
      flex-direction: column-reverse; /* icon at bottom, options grow upward */
      gap: 0;
      padding: 16px;
      width: 52px;
      cursor: pointer;
    }

    .sound-icon-default {
      overflow: hidden;
      max-height: 20px;
      opacity: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: max-height 0.25s ease, opacity 0.15s ease;
    }

    .sound-options {
      display: flex;
      flex-direction: column-reverse; /* options stack bottom-up so first item is nearest the icon */
      align-items: center;
      gap: var(--spacing-lg);
      overflow: hidden;
      max-height: 0;
      opacity: 0;
      pointer-events: none;
      transition: max-height 0.3s ease, opacity 0.2s ease 0.05s;
    }

    .sound-btn.is-open .sound-icon-default {
      max-height: 0;
      opacity: 0;
      transition: max-height 0.2s ease, opacity 0.15s ease;
    }

    .sound-btn.is-open .sound-options {
      max-height: 200px;
      opacity: 1;
      pointer-events: auto;
      transition: max-height 0.35s ease, opacity 0.2s ease 0.05s;
    }

    .sound-option {
      width: 20px;
      height: 20px;
      background: none;
      border: none;
      padding: 0;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      opacity: 0.4;
      transition: opacity 0.15s;
    }
    .sound-option img { width: 20px; height: 20px; display: block; }
    .sound-option:hover { opacity: 0.7; }
    .sound-option.is-active { opacity: 1; }

    /* Tooltip */
    .sound-tooltip {
      position: fixed;
      font-family: var(--font-doto);
      font-size: 16px;
      font-weight: 400;
      color: white;
      white-space: nowrap;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.15s;
      z-index: 200;
      transform: translateY(-50%);
    }
    .sound-tooltip.visible { opacity: 1; }

    /* ══════════════════════════════════
       STICKY NOTE
    ══════════════════════════════════ */
    .sticky {
      position: absolute;
      width: 186px;
      min-height: 160px;
      background: #fff235;
      padding: var(--spacing-lg);
      box-shadow: -8px 8px 9px 0px rgba(0, 0, 0, 0.4);
      display: flex;
      flex-direction: column;
      z-index: 20;
      cursor: grab;
      user-select: none;
    }
    .sticky.is-dragging {
      cursor: grabbing;
      box-shadow: -10px 12px 18px 0px rgba(0, 0, 0, 0.5);
    }

    .sticky-inner {
      display: flex;
      flex-direction: column;
      gap: var(--spacing-m);
      width: 100%;
      pointer-events: none;
    }

    /* Gap between individual task rows */
    #task-list {
      display: flex;
      flex-direction: column;
      gap: var(--spacing-m);
    }

    .sticky-title {
      font-family: var(--font-helvetica);
      font-weight: 500;
      font-size: 12px;
      color: var(--colour-black);
      line-height: normal;
    }

    .task-row {
      display: flex;
      gap: 8px;
      align-items: flex-start;
      pointer-events: all;
      cursor: default;
    }

    /* Delete button — hidden until row is hovered */
    .task-delete {
      flex-shrink: 0;
      width: 14px;
      height: 14px;
      margin-top: 1px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: none;
      border: none;
      padding: 0;
      cursor: pointer;
      opacity: 0;
      transition: opacity 0.15s;
      pointer-events: all;
    }
    .task-row:hover .task-delete { opacity: 0.4; }
    .task-delete:hover { opacity: 1 !important; }

    /* Swoosh-out animation when a task is deleted */
    @keyframes task-swoosh-out {
      0%   { opacity: 1; transform: translateX(0);     max-height: 60px; margin-bottom: 0; }
      55%  { opacity: 0; transform: translateX(-110%); max-height: 60px; margin-bottom: 0; }
      100% { opacity: 0; transform: translateX(-110%); max-height: 0;    margin-bottom: -8px; }
    }
    .task-removing {
      animation: task-swoosh-out 0.32s ease forwards;
      overflow: hidden;
      pointer-events: none;
    }

    /* Checkbox */
    .checkbox {
      flex-shrink: 0;
      width: 16px;
      height: 16px;
      min-width: 16px;
      background: var(--colour-white);
      border: 1px solid var(--colour-grey-100);
      border-radius: 2px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-top: 1px;
      cursor: pointer;
      transition: border-color 0.15s;
    }
    .checkbox:hover { border-color: #9ca3af; }

    /* Task label */
    .task-label {
      font-family: var(--font-helvetica);
      font-weight: 400;
      font-size: 12px;
      color: var(--colour-grey-600);
      line-height: 1.4;
      flex: 1;
      min-width: 0;
      word-break: break-word;
    }
    .task-label.done {
      text-decoration: line-through;
      font-style: italic;
      opacity: 0.7;
    }
    .task-label.placeholder { opacity: 0.45; cursor: text; }

    /* Inline task input (edit mode) */
    .task-input {
      flex: 1;
      min-width: 0;
      width: 100%;
      font-family: var(--font-helvetica);
      font-weight: 400;
      font-size: 12px;
      color: var(--colour-grey-600);
      line-height: 1.4;
      background: transparent;
      border: none;
      outline: none;
      padding: 0;
      margin: 0;
      cursor: text;
      pointer-events: all;
      resize: none;
      overflow: hidden;
    }

    /* ══════════════════════════════════
       BOTTOM CONTROLS
    ══════════════════════════════════ */
    .controls {
      position: absolute;
      bottom: 44px;
      left: 40px;
      right: 40px;
      z-index: 10;
      display: flex;
      flex-direction: row;
      gap: var(--spacing-lg);
      align-items: flex-end;
      justify-content: center;
    }

    /* Player */
    .player {
      display: flex;
      gap: 8px;
      align-items: center;
      justify-content: center;
      padding: var(--spacing-lg);
      backdrop-filter: blur(12px);
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      border-radius: var(--spacing-s);
      flex-shrink: 0;
    }

    .player-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 20px;
      height: 20px;
      flex-shrink: 0;
      cursor: pointer;
      background: none;
      border: none;
      padding: 0;
    }
    .player-btn:hover { opacity: 0.7; }

    .track-name {
      font-family: var(--font-doto);
      font-weight: 400;
      font-size: 16px;
      color: var(--colour-white);
      white-space: nowrap;
      line-height: normal;
      flex-shrink: 0;
      padding: 0 4px;
    }

    /* Mobile-only icon row (timer + sound beneath player) — hidden by default */
    .controls-row2 {
      display: none;
      gap: var(--spacing-lg);
      align-items: center;
      justify-content: center;
    }

    /* ══════════════════════════════════
       TIMER BUTTON STATES
    ══════════════════════════════════ */

    /* All three states always in flex; max-width + opacity drive transitions */
    .timer-state {
      display: flex;
      align-items: center;
      gap: 6px;
      overflow: hidden;
      max-width: 0;
      opacity: 0;
      transition: opacity 0.2s ease, max-width 0.3s ease;
      white-space: nowrap;
    }

    /* Default: clock visible */
    .timer-default { max-width: 20px; opacity: 1; }

    /* Hover (not running): clock out → play+label in */
    .timer-btn:not(.is-running):hover .timer-default {
      max-width: 0; opacity: 0;
      transition: opacity 0.15s ease, max-width 0.25s ease;
    }
    .timer-btn:not(.is-running):hover .timer-hover {
      max-width: 160px; opacity: 1;
      transition: opacity 0.2s ease 0.1s, max-width 0.3s ease;
    }

    /* Running: clock out → stop in */
    .timer-btn.is-running .timer-default { max-width: 0; opacity: 0; }
    .timer-btn.is-running .timer-stop    { max-width: 20px; opacity: 1; }

    .timer-start-label {
      font-family: var(--font-doto);
      font-size: 16px;
      font-weight: 400;
      color: white;
      white-space: nowrap;
    }

    /* ══════════════════════════════════
       POMODORO OVERLAY
    ══════════════════════════════════ */
    #pomodoro-overlay {
      position: absolute;
      inset: 0;
      z-index: 8;
      pointer-events: none;
      display: none;
      align-items: center;
      justify-content: flex-start;
      flex-direction: column;
      gap: var(--spacing-m);
      padding: 164px 0 80px;
    }
    #pomodoro-overlay.active { display: flex; }

    .pomo-label {
      font-family: var(--font-doto);
      font-weight: 600;
      font-size: 24px;
      color: white;
      white-space: nowrap;
    }

    .pomo-time {
      font-family: var(--font-doto);
      font-weight: 600;
      font-size: 80px;
      color: white;
      line-height: 1;
      white-space: nowrap;
    }

    /* Overlay control row — pause + exit */
    .pomo-controls {
      display: flex;
      gap: var(--spacing-m);
      pointer-events: all;
    }

    .pomo-pause-btn, .pomo-exit-btn { pointer-events: all; }

    /* Suppress hover expansion immediately after stopping */
    .timer-btn.no-hover:not(.is-running):hover .timer-default {
      max-width: 20px !important; opacity: 1 !important;
    }
    .timer-btn.no-hover:not(.is-running):hover .timer-hover {
      max-width: 0 !important; opacity: 0 !important;
    }

    /* Break mode — dim and disable player + sound controls */
    .break-mode .player,
    .break-mode .sound-btn {
      pointer-events: none;
      opacity: 0.35;
      transition: opacity 0.4s ease;
    }

    /* ══════════════════════════════════
       MOBILE  ≤ 639px
    ══════════════════════════════════ */
    @media (max-width: 639px) {
      .header { padding: var(--spacing-xl) 24px; }

      /* Scene nav hidden — accessed via mobile menu */
      .scene-nav { display: none; }

      /* Show menu button on mobile */
      .menu-btn { display: flex; }

      /* Show mobile scene panel when menu is open */
      .header.menu-open .mobile-menu { display: flex; }

      /* Hide sticky note when mobile menu is open */
      .header.menu-open ~ .sticky {
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.2s;
      }

      .controls {
        flex-direction: column;
        left: 24px;
        right: 24px;
        align-items: center;
      }

      /* Make player span full width on mobile */
      .player { width: 100%; }

      /* Hide individual icon-btns from top row — moved into row2 */
      .controls > .icon-btn { display: none; }

      /* Show the combined timer+sound row above the player */
      .controls-row2 { display: flex; order: -1; }

      /* Keep timer circle fixed on mobile — no hover expansion */
      .timer-btn:not(.is-running):hover .timer-default { max-width: 20px; opacity: 1; }
      .timer-btn:not(.is-running):hover .timer-hover    { max-width: 0;    opacity: 0; }

      /* Scene-specific mobile framing */
      .scene-video[data-active-scene="calm"] { object-position: 75% center; }
      .scene-video[data-active-scene="room"] { object-position: 68% center; }
    }

    /* Mobile panel never shows on tablet/desktop */
    @media (min-width: 640px) {
      .mobile-menu { display: none !important; }
    }
  </style>
  <script defer src="/_vercel/insights/script.js"></script>
  <script defer src="/_vercel/speed-insights/script.js"></script>
</head>
<body>
<div id="app">

  <!-- Two video layers for seamless A/B crossfade (no flash between scenes) -->
  <video class="scene-bg scene-video" id="scene-video-a" loop muted playsinline></video>
  <video class="scene-bg scene-video" id="scene-video-b" loop muted playsinline></video>

  <!-- Header -->
  <header class="header" id="header">
    <nav class="navbar">
      <span class="logo">FOCUS FLOW</span>

      <!-- Scene nav: desktop + tablet only -->
      <div class="scene-nav">
        <span data-scene="skyline">Skyline(S)</span>
        <span data-scene="calm">Calm(C)</span>
        <span data-scene="room">Room(R)</span>
        <span data-scene="focus" class="active">Focus(F)</span>
        <span data-scene="drive">Drive(D)</span>
      </div>

      <!-- Menu button: mobile only -->
      <button class="menu-btn" id="menu-btn" title="Scenes">
        <span class="menu-icon-default">
          <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
            <circle cx="10" cy="4"  r="1.5" fill="white"/>
            <circle cx="10" cy="10" r="1.5" fill="white"/>
            <circle cx="10" cy="16" r="1.5" fill="white"/>
          </svg>
        </span>
        <span class="menu-icon-open">
          <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
            <path d="M5 5L15 15M15 5L5 15" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
          </svg>
        </span>
      </button>
    </nav>

    <!-- Mobile scene selection panel (edge-to-edge, flat list) -->
    <div class="mobile-menu" id="mobile-menu">
      <span data-scene="skyline">Skyline</span>
      <span data-scene="calm">Calm</span>
      <span data-scene="room">Room</span>
      <span data-scene="focus" class="active">Focus</span>
      <span data-scene="drive">Drive</span>
    </div>
  </header>

  <!-- Sticky Task Note (position & content managed by JS) -->
  <div class="sticky" id="sticky">
    <div class="sticky-inner" id="sticky-inner">
      <p class="sticky-title">Task for today</p>
      <div id="task-list"></div>
    </div>
  </div>

  <!-- Bottom Controls -->
  <div class="controls">

    <!-- Timer (hidden on mobile via CSS) -->
    <button class="icon-btn timer-btn" title="Timer">
      <!-- default: clock -->
      <span class="timer-state timer-default">
        <svg width="20" height="20" viewBox="0 0 20 20" fill="none"><circle cx="10" cy="11.5" r="6.5" stroke="white" stroke-width="1.5"/><path d="M10 8.5V11.5L12 13" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/><path d="M7.5 2.5h5" stroke="white" stroke-width="1.5" stroke-linecap="round"/><path d="M10 2.5V4.5" stroke="white" stroke-width="1.5" stroke-linecap="round"/></svg>
      </span>
      <!-- hover: play + label -->
      <span class="timer-state timer-hover">
        <svg width="20" height="20" viewBox="0 0 20 20" fill="none"><path d="M6 4.5L16 10L6 15.5V4.5Z" fill="white"/></svg>
        <span class="timer-start-label">Start Pomodoro</span>
      </span>
      <!-- running: stop square -->
      <span class="timer-state timer-stop">
        <svg width="20" height="20" viewBox="0 0 20 20" fill="none"><rect x="4.5" y="4.5" width="11" height="11" rx="2" fill="white"/></svg>
      </span>
    </button>

    <!-- Player -->
    <div class="player">
      <button class="player-btn" id="prev-btn" title="Previous">
        <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
          <path d="M5 4.5V15.5" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
          <path d="M15.5 4.5L7 10L15.5 15.5V4.5Z" fill="white"/>
        </svg>
      </button>

      <span class="track-name" id="track-name">Lo Fi 01</span>

      <button class="player-btn" id="play-pause-btn" title="Play/Pause">
        <!-- pause bars (playing state) -->
        <svg id="icon-pause" width="20" height="20" viewBox="0 0 20 20" fill="none">
          <rect x="5"    y="4" width="3.5" height="12" rx="1" fill="white"/>
          <rect x="11.5" y="4" width="3.5" height="12" rx="1" fill="white"/>
        </svg>
        <!-- play triangle (paused state) -->
        <svg id="icon-play" width="20" height="20" viewBox="0 0 20 20" fill="none" style="display:none">
          <path d="M6 4.5L16 10L6 15.5V4.5Z" fill="white"/>
        </svg>
      </button>

      <button class="player-btn" id="next-btn" title="Next">
        <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
          <path d="M15 4.5V15.5" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
          <path d="M4.5 4.5L13 10L4.5 15.5V4.5Z" fill="white"/>
        </svg>
      </button>
    </div>

    <!-- Sound (hidden on mobile via CSS, row2 takes over) -->
    <div class="icon-btn sound-btn" id="sound-btn-desktop" role="button" tabindex="0" title="Sound">
      <div class="sound-icon-default">
        <img src="icon/sound.png" width="20" height="20" alt="Sound">

<script>
  /* ══════════════════════════════════════
     HEADER — mobile menu toggle
  ══════════════════════════════════════ */
  (function initHeader() {
    var header     = document.getElementById('header');
    var menuBtn    = document.getElementById('menu-btn');
    var mobileMenu = document.getElementById('mobile-menu');
    var menuOpen   = false;

    function setMenuOpen(open) {
      menuOpen = open;
      header.classList.toggle('menu-open', open);
    }

    /* Toggle on button click */
    menuBtn.addEventListener('click', function(e) {
      e.stopPropagation();
      document.querySelectorAll('.sound-btn').forEach(function(b) { b.classList.remove('is-open'); });
      setMenuOpen(!menuOpen);
    });

    /* Close on outside click */
    document.addEventListener('click', function(e) {
      if (menuOpen && !header.contains(e.target)) setMenuOpen(false);
    });

    /* Close when a scene is picked from mobile menu */
    mobileMenu.addEventListener('click', function(e) {
      if (e.target.closest('[data-scene]')) setMenuOpen(false);
    });
  })();

  /* ── Scene switching (works for both desktop nav + mobile accordion) ── */
  (function initScenes() {
    var scenes = {
      skyline: 'Background videos/scenes=skyline.mp4',
      calm:    'Background videos/scenes=calm.mp4',
      room:    'Background videos/scenes=room.mp4',
      focus:   'Background videos/scenes=focus.mp4',
      drive:   'Background videos/scenes=drive.mp4',
    };

    var bgVideoA  = document.getElementById('scene-video-a');
    var bgVideoB  = document.getElementById('scene-video-b');
    var activeVid = bgVideoA;

    /* Boot: load default focus scene into video A */
    bgVideoA.src = scenes.focus;
    bgVideoA.load();
    bgVideoA.play().catch(function(){});
    bgVideoA.classList.add('active-video');
    bgVideoA.dataset.activeScene = 'focus';

    function switchScene(sceneName) {
      if (!scenes[sceneName]) return;

      document.querySelectorAll('[data-scene]').forEach(function(el) {
        el.classList.toggle('active', el.dataset.scene === sceneName);
      });

      /* Load new scene into the inactive video element */
      var nextVid = activeVid === bgVideoA ? bgVideoB : bgVideoA;
      nextVid.src = scenes[sceneName];
      nextVid.load();
      nextVid.play().catch(function(){});
      nextVid.dataset.activeScene = sceneName;

      /* Simultaneously fade new in and old out — no flash */
      nextVid.classList.add('active-video');
      activeVid.classList.remove('active-video');
      activeVid.removeAttribute('data-active-scene');
      activeVid = nextVid;
    }

    /* Desktop scene-nav */
    document.querySelector('.scene-nav').addEventListener('click', function(e) {
      var item = e.target.closest('[data-scene]');
      if (!item || item.classList.contains('active')) return;
      switchScene(item.dataset.scene);
    });

    /* Mobile scene panel — switch scene on tap */
    document.getElementById('mobile-menu').addEventListener('click', function(e) {
      var item = e.target.closest('[data-scene]');
      if (!item || item.classList.contains('active')) return;
      switchScene(item.dataset.scene);
    });

    /* Keyboard shortcuts: S C R F D — desktop + tablet only */
    var sceneKeys = { s: 'skyline', c: 'calm', r: 'room', f: 'focus', d: 'drive' };
    document.addEventListener('keydown', function(e) {
      if (window.innerWidth <= 639) return;
      if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
      if (e.metaKey || e.ctrlKey || e.altKey) return;
      var scene = sceneKeys[e.key.toLowerCase()];
      if (scene) switchScene(scene);
    });
  })();

  /* ══════════════════════════════════════
     STICKY NOTE
  ══════════════════════════════════════ */
  (function initSticky() {
  const CHECKMARK_SVG = `<svg width="10" height="8" viewBox="0 0 10 8" fill="none"><path d="M1 3.5L3.8 6.5L9 1" stroke="#4b5563" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>`;

  let tasks = (function() {
    try { var s = JSON.parse(localStorage.getItem('ff_tasks')); if (Array.isArray(s) && s.length) return s; } catch(e) {}
    return [
      { id: 1, text: 'Finish the pitch deck research', state: 'added' },
      { id: 2, text: 'Set user interview',             state: 'checked' },
    ];
  })();
  let nextId = tasks.length ? Math.max.apply(null, tasks.map(function(t){ return t.id; })) + 1 : 1;
  let editingId = null; /* null means not editing; 0 means the "add" row */

  function saveTasks() {
    try { localStorage.setItem('ff_tasks', JSON.stringify(tasks)); } catch(e) {}
  }

  /* ── Render ── */
  function renderTasks() {
    const list = document.getElementById('task-list');
    list.innerHTML = '';

    tasks.forEach(task => {
      const row = document.createElement('div');
      row.className = 'task-row';

      /* Checkbox */
      const cb = document.createElement('div');
      cb.className = 'checkbox';
      cb.innerHTML = task.state === 'checked' ? CHECKMARK_SVG : '';
      cb.addEventListener('click', () => toggleTask(task.id));

      /* Label / input */
      if (editingId === task.id) {
        const input = makeInput(task.text, val => {
          if (val.trim()) task.text = val.trim();
          editingId = null;
          saveTasks();
          renderTasks();
        });
        row.appendChild(cb);
        row.appendChild(input);
        list.appendChild(row);
        input.focus();
        input.select();
        return;
      }

      const label = document.createElement('span');
      label.className = 'task-label' + (task.state === 'checked' ? ' done' : '');
      label.textContent = task.text;
      label.addEventListener('dblclick', () => { editingId = task.id; renderTasks(); });
      let _lastTap = 0;
      label.addEventListener('touchend', (e) => {
        const now = Date.now();
        if (now - _lastTap < 300) { e.preventDefault(); editingId = task.id; renderTasks(); }
        _lastTap = now;
      });

      /* Delete button */
      const del = document.createElement('button');
      del.className = 'task-delete';
      del.title = 'Delete task';
      del.innerHTML = `<svg width="10" height="10" viewBox="0 0 10 10" fill="none"><path d="M1 1l8 8M9 1L1 9" stroke="#313131" stroke-width="1.5" stroke-linecap="round"/></svg>`;
      del.addEventListener('click', () => {
        row.classList.add('task-removing');
        setTimeout(() => {
          tasks = tasks.filter(t => t.id !== task.id);
          saveTasks();
          renderTasks();
        }, 300);
      });

      row.appendChild(cb);
      row.appendChild(label);
      row.appendChild(del);
      list.appendChild(row);
    });

    /* "Add a task" row */
    const addRow = document.createElement('div');
    addRow.className = 'task-row';

    const addCb = document.createElement('div');
    addCb.className = 'checkbox';

    if (editingId === 0) {
      const input = makeInput('', val => {
        if (val.trim()) tasks.push({ id: nextId++, text: val.trim(), state: 'added' });
        editingId = null;
        saveTasks();
        renderTasks();
      });
      addRow.appendChild(addCb);
      addRow.appendChild(input);
      list.appendChild(addRow);
      input.focus();
    } else {
      const placeholder = document.createElement('span');
      placeholder.className = 'task-label placeholder';
      placeholder.textContent = 'Add a task';
      addRow.addEventListener('click', () => { editingId = 0; renderTasks(); });
      addRow.appendChild(addCb);
      addRow.appendChild(placeholder);
      list.appendChild(addRow);
    }
  }

  function makeInput(initialValue, onCommit) {
    const ta = document.createElement('textarea');
    ta.className = 'task-input';
    ta.value = initialValue;
    ta.placeholder = 'Add a task';
    ta.rows = 1;

    /* Auto-grow height to fit content */
    const autoGrow = () => { ta.style.height = 'auto'; ta.style.height = ta.scrollHeight + 'px'; };
    ta.addEventListener('input', autoGrow);
    /* Size correctly on first paint */
    requestAnimationFrame(autoGrow);

    let committed = false;
    const commit = () => {
      if (committed) return;
      committed = true;
      onCommit(ta.value);
    };
    ta.addEventListener('keydown', e => {
      if (e.key === 'Enter')  { e.preventDefault(); commit(); }
      if (e.key === 'Escape') { committed = true; editingId = null; renderTasks(); }
    });
    ta.addEventListener('blur', commit);
    ta.addEventListener('mousedown', e => e.stopPropagation());
    ta.addEventListener('touchstart', e => e.stopPropagation());
    return ta;
  }

  function toggleTask(id) {
    const t = tasks.find(t => t.id === id);
    if (!t) return;
    t.state = t.state === 'checked' ? 'added' : 'checked';
    saveTasks();
    renderTasks();
  }

  /* ── Drag ── */
  (function initDrag() {
    const sticky = document.getElementById('sticky');

    /* Place initial position */
    sticky.style.left = '40px';
    sticky.style.top  = '116px';

    let dragging = false, ox = 0, oy = 0, sx = 0, sy = 0;

    function getConstraints() {
      const headerH   = document.querySelector('.header').offsetHeight;
      const ctrlRect  = document.querySelector('.controls').getBoundingClientRect();
      /* For mobile, also account for row2 if visible */
      const row2      = document.querySelector('.controls-row2');
      const row2H     = (row2 && getComputedStyle(row2).display !== 'none') ? row2.offsetHeight + 16 : 0;
      const ctrlTop   = ctrlRect.top - row2H - 16;
      const stickyW   = sticky.offsetWidth;
      const stickyH   = sticky.offsetHeight;
      return {
        minX: 0,
        maxX: window.innerWidth  - stickyW,
        minY: headerH + 8,
        maxY: ctrlTop - stickyH - 8,
      };
    }

    function onStart(clientX, clientY) {
      dragging = true;
      ox = clientX; oy = clientY;
      sx = sticky.offsetLeft; sy = sticky.offsetTop;
      sticky.classList.add('is-dragging');
    }

    function onMove(clientX, clientY) {
      if (!dragging) return;
      const c    = getConstraints();
      const newX = Math.max(c.minX, Math.min(c.maxX, sx + (clientX - ox)));
      const newY = Math.max(c.minY, Math.min(c.maxY, sy + (clientY - oy)));
      sticky.style.left = newX + 'px';
      sticky.style.top  = newY + 'px';
    }

    function onEnd() {
      dragging = false;
      sticky.classList.remove('is-dragging');
    }

    /* Mouse */
    sticky.addEventListener('mousedown', e => {
      if (e.target.closest('.checkbox') || e.target.closest('input') || e.target.closest('.task-delete')) return;
      e.preventDefault();
      onStart(e.clientX, e.clientY);
    });
    document.addEventListener('mousemove', e => onMove(e.clientX, e.clientY));
    document.addEventListener('mouseup',   onEnd);

    /* Touch */
    sticky.addEventListener('touchstart', e => {
      if (e.target.closest('.checkbox') || e.target.closest('input') || e.target.closest('textarea') || e.target.closest('.task-delete')) return;
      const t = e.touches[0];
      onStart(t.clientX, t.clientY);
    }, { passive: true });
    document.addEventListener('touchmove', e => {
      if (!dragging) return;
      e.preventDefault();
      const t = e.touches[0];
      onMove(t.clientX, t.clientY);
    }, { passive: false });
    document.addEventListener('touchend', onEnd);
  })();

  /* ── Mobile: re-center sticky when it would overlap controls after resize ── */
  window.addEventListener('resize', () => {
    const sticky = document.getElementById('sticky');
    const c = (function() {
      const headerH  = document.querySelector('.header').offsetHeight;
      const ctrlRect = document.querySelector('.controls').getBoundingClientRect();
      const row2     = document.querySelector('.controls-row2');
      const row2H    = (row2 && getComputedStyle(row2).display !== 'none') ? row2.offsetHeight + 16 : 0;
      return {
        minX: 0, maxX: window.innerWidth  - sticky.offsetWidth,
        minY: headerH + 8,
        maxY: ctrlRect.top - row2H - 16 - sticky.offsetHeight - 8,
      };
    })();
    sticky.style.left = Math.max(c.minX, Math.min(c.maxX, sticky.offsetLeft)) + 'px';
    sticky.style.top  = Math.max(c.minY, Math.min(c.maxY, sticky.offsetTop))  + 'px';
  });

  /* Mobile: center sticky horizontally */
  if (window.innerWidth <= 639) {
    const sticky = document.getElementById('sticky');
    sticky.style.left = Math.round((window.innerWidth - sticky.offsetWidth) / 2) + 'px';
    sticky.style.top  = '103px';
  }

  renderTasks();
  })(); /* end initSticky */

  /* ══════════════════════════════════════
     POMODORO
  ══════════════════════════════════════ */
  (function initPomodoro() {
    var SESSIONS     = 3;
    var SESSION_SECS = 20 * 60;
    var BREAK_SECS   =  5 * 60;

    var overlay    = document.getElementById('pomodoro-overlay');
    var pomoLabel  = document.getElementById('pomo-label');
    var pomoTime   = document.getElementById('pomo-time');
    var pomoPause  = document.getElementById('pomo-pause-btn');
    var pomoExit   = document.getElementById('pomo-exit-btn');
    var timerBtns  = document.querySelectorAll('.timer-btn');
    var app        = document.getElementById('app');

    var breakAudio = new Audio('White noise/Break.mp3');
    breakAudio.loop   = true;
    breakAudio.volume = 0.7;

    var state     = 'idle';
    var session   = 0;
    var remaining = 0;
    var paused    = false;
    var ticker    = null;

    function fmt(secs) {
      var m = Math.floor(secs / 60), s = secs % 60;
      return (m < 10 ? '0' : '') + m + ':' + (s < 10 ? '0' : '') + s;
    }

    function setRunning(on) {
      timerBtns.forEach(function(b) { b.classList.toggle('is-running', on); });
    }

    function setPauseIcon(isPaused) {
      pomoPause.innerHTML = isPaused
        ? '<svg width="20" height="20" viewBox="0 0 20 20" fill="none"><path d="M6 4.5L16 10L6 15.5V4.5Z" fill="white"/></svg>'
        : '<svg width="20" height="20" viewBox="0 0 20 20" fill="none"><rect x="5" y="4" width="3.5" height="12" rx="1" fill="white"/><rect x="11.5" y="4" width="3.5" height="12" rx="1" fill="white"/></svg>';
    }

    function tick() {
      if (paused) return;
      remaining--;
      pomoTime.textContent = fmt(remaining);
      if (remaining > 0) return;
      clearInterval(ticker); ticker = null;
      if (state === 'session') {
        if (session < SESSIONS) { startBreak(); } else { stopAll(); }
      } else {
        startSession();
      }
    }

    function startSession() {
      /* Stop break audio and restore music/sound when resuming from break */
      breakAudio.pause();
      breakAudio.currentTime = 0;
      if (window._resumeMusicAfterBreak) window._resumeMusicAfterBreak();
      if (window._resumeSoundAfterBreak) window._resumeSoundAfterBreak();
      app.classList.remove('break-mode');
      state = 'session'; session++;
      remaining = SESSION_SECS; paused = false;
      pomoLabel.textContent = 'Session ' + session;
      pomoTime.textContent  = fmt(remaining);
      setPauseIcon(false);
      overlay.classList.add('active');
      setRunning(true);
      ticker = setInterval(tick, 1000);
    }

    function startBreak() {
      state = 'break';
      remaining = BREAK_SECS; paused = false;
      pomoLabel.textContent = 'Break';
      pomoTime.textContent  = fmt(remaining);
      setPauseIcon(false);
      /* Pause lo-fi and white noise, play break track, lock controls */
      if (window._pauseMusicForBreak) window._pauseMusicForBreak();
      if (window._pauseSoundForBreak) window._pauseSoundForBreak();
      breakAudio.currentTime = 0;
      breakAudio.play().catch(function() {});
      app.classList.add('break-mode');
      ticker = setInterval(tick, 1000);
    }

    function stopAll() {
      clearInterval(ticker); ticker = null;
      /* Stop break audio and restore music/sound */
      breakAudio.pause();
      breakAudio.currentTime = 0;
      if (window._resumeMusicAfterBreak) window._resumeMusicAfterBreak();
      if (window._resumeSoundAfterBreak) window._resumeSoundAfterBreak();
      app.classList.remove('break-mode');
      state = 'idle'; session = 0; paused = false;
      overlay.classList.remove('active');
      setRunning(false);
    }

    /* Timer buttons: click to start / stop */
    timerBtns.forEach(function(btn) {
      btn.addEventListener('click', function() {
        if (state === 'idle') {
          session = 0;
          startSession();
        } else {
          stopAll();
          timerBtns.forEach(function(b) { b.classList.add('no-hover'); });
          if ('ontouchstart' in window) {
            setTimeout(function() { timerBtns.forEach(function(b) { b.classList.remove('no-hover'); }); }, 50);
          }
        }
      });

      /* Re-enable hover once the cursor leaves */
      btn.addEventListener('mouseleave', function() {
        this.classList.remove('no-hover');
      });
    });

    /* Exit button inside overlay */
    pomoExit.addEventListener('click', function() {
      stopAll();
      timerBtns.forEach(function(b) { b.classList.add('no-hover'); });
      if ('ontouchstart' in window) {
        setTimeout(function() { timerBtns.forEach(function(b) { b.classList.remove('no-hover'); }); }, 50);
      }
    });

    /* Pause / resume */
    pomoPause.addEventListener('click', function() {
      if (state === 'idle') return;
      paused = !paused;
      if (state === 'break') {
        if (paused) breakAudio.pause();
        else breakAudio.play().catch(function() {});
      }
      if (!paused && !ticker) ticker = setInterval(tick, 1000);
      setPauseIcon(paused);
    });
  })();

  /* ══════════════════════════════════════
     SOUND
  ══════════════════════════════════════ */
  (function initSound() {
    var soundBtns = document.querySelectorAll('.sound-btn');
    var activeSound = 'none';
    var tooltip = document.getElementById('sound-tooltip');

    var SOUND_FILES = {
      campfire: 'White noise/Campfire.mp3',
      nature:   'White noise/Nature.mp3',
      waves:    'White noise/Waves.mp3',
      forest:   'White noise/Forest.mp3',
    };

    var noiseAudio = new Audio();
    noiseAudio.loop = true;
    noiseAudio.volume = 0.6;

    function playSound(sound) {
      noiseAudio.pause();
      if (sound === 'none') {
        noiseAudio.src = '';
        return;
      }
      var src = SOUND_FILES[sound];
      if (!src) return;
      noiseAudio.src = src;
      noiseAudio.load();
      noiseAudio.play().catch(function() {});
    }

    /* Fallback: if loop flag is ignored by the browser, restart manually */
    noiseAudio.addEventListener('ended', function() {
      if (noiseAudio.src) noiseAudio.play().catch(function() {});
    });

    soundBtns.forEach(function(btn) {
      btn.addEventListener('click', function(e) {
        if (e.target.closest('.sound-option')) return;
        e.stopPropagation();
        var isOpen = this.classList.contains('is-open');
        soundBtns.forEach(function(b) { b.classList.remove('is-open'); });
        tooltip.classList.remove('visible');
        if (!isOpen) this.classList.add('is-open');
      });
    });

    document.addEventListener('click', function() {
      soundBtns.forEach(function(b) { b.classList.remove('is-open'); });
      tooltip.classList.remove('visible');
    });

    document.querySelectorAll('.sound-option').forEach(function(opt) {
      opt.addEventListener('click', function(e) {
        e.stopPropagation();
        activeSound = this.dataset.sound;
        document.querySelectorAll('.sound-option').forEach(function(o) {
          o.classList.toggle('is-active', o.dataset.sound === activeSound);
        });
        var selectedImg = this.querySelector('img');
        if (selectedImg) {
          document.querySelectorAll('.sound-icon-default img').forEach(function(img) {
            img.src = selectedImg.src;
            img.alt = selectedImg.alt;
          });
        }
        playSound(activeSound);
        soundBtns.forEach(function(b) { b.classList.remove('is-open'); });
        tooltip.classList.remove('visible');
      });

      opt.addEventListener('mouseenter', function() {
        var btn = this.closest('.sound-btn');
        if (!btn || !btn.classList.contains('is-open')) return;
        var rect = this.getBoundingClientRect();
        var btnRect = btn.getBoundingClientRect();
        tooltip.textContent = this.dataset.tooltip;
        tooltip.style.left = (btnRect.right + 12) + 'px';
        tooltip.style.top  = (rect.top + rect.height / 2) + 'px';
        tooltip.classList.add('visible');
      });

      opt.addEventListener('mouseleave', function() {
        tooltip.classList.remove('visible');
      });
    });

    /* Expose pause/resume for break coordination */
    var _soundWasPlaying = false;
    window._pauseSoundForBreak = function() {
      _soundWasPlaying = !noiseAudio.paused && !!noiseAudio.src;
      if (_soundWasPlaying) noiseAudio.pause();
    };
    window._resumeSoundAfterBreak = function() {
      if (_soundWasPlaying) {
        noiseAudio.play().catch(function() {});
        _soundWasPlaying = false;
      }
    };
  })();

  /* ══════════════════════════════════════
     MUSIC PLAYER
     ─────────────────────────────────────
     To add tracks: drop an MP3 into
     "Lo fi music/" and add an entry below.
  ══════════════════════════════════════ */
  (function initPlayer() {
    var PLAYLIST = [
      { name: 'Lo Fi 01', src: 'Lo fi music/Focus flow 01.mp3' },
      { name: 'Lo Fi 02', src: 'Lo fi music/Focus flow 02.mp3' },
      { name: 'Lo Fi 03', src: 'Lo fi music/Focus flow 03.mp3' },
      { name: 'Lo Fi 04', src: 'Lo fi music/Focus flow 04.mp3' },
      { name: 'Lo Fi 05', src: 'Lo fi music/Focus flow 05.mp3' },
      { name: 'Lo Fi 06', src: 'Lo fi music/Focus flow 06.mp3' },
      { name: 'Lo Fi 07', src: 'Lo fi music/Focus flow 07.mp3' },
      { name: 'Lo Fi 08', src: 'Lo fi music/Focus flow 08.mp3' },
      { name: 'Lo Fi 09', src: 'Lo fi music/Focus flow 09.mp3' },
      { name: 'Lo Fi 10', src: 'Lo fi music/Focus flow 10.mp3' },
      { name: 'Lo Fi 11', src: 'Lo fi music/Focus flow 11.mp3' },
      { name: 'Lo Fi 12', src: 'Lo fi music/Focus flow 12.mp3' },
      { name: 'Lo Fi 13', src: 'Lo fi music/Focus flow 13.mp3' },
    ];

    var audio       = new Audio();
    audio.volume    = 0.8;
    var current     = 0;
    var playing     = false;

    /* ── DOM refs ── */
    var trackName    = document.getElementById('track-name');
    var prevBtn      = document.getElementById('prev-btn');
    var nextBtn      = document.getElementById('next-btn');
    var playPauseBtn = document.getElementById('play-pause-btn');
    var iconPause    = document.getElementById('icon-pause');
    var iconPlay     = document.getElementById('icon-play');

    /* ── Helpers ── */
    function setPlayIcon(isPlaying) {
      iconPause.style.display = isPlaying ? 'block' : 'none';
      iconPlay.style.display  = isPlaying ? 'none'  : 'block';
    }

    function loadTrack(index, autoPlay) {
      current = ((index % PLAYLIST.length) + PLAYLIST.length) % PLAYLIST.length;
      audio.src = PLAYLIST[current].src;
      trackName.textContent = PLAYLIST[current].name;
      if (autoPlay) {
        audio.play().then(function() {
          playing = true;
          setPlayIcon(true);
        }).catch(function() {
          playing = false;
          setPlayIcon(false);
        });
      } else {
        setPlayIcon(false);
      }
    }

    function togglePlay() {
      if (playing) {
        audio.pause();
        playing = false;
        setPlayIcon(false);
      } else {
        audio.play().then(function() {
          playing = true;
          setPlayIcon(true);
        });
      }
    }

    /* ── Auto-advance when track ends ── */
    audio.addEventListener('ended', function() {
      loadTrack(current + 1, true);
    });

    /* ── Controls ── */
    prevBtn.addEventListener('click', function() {
      /* Restart if >3 s in, else go to previous */
      if (audio.currentTime > 3) {
        audio.currentTime = 0;
        if (!playing) togglePlay();
      } else {
        loadTrack(current - 1, playing);
      }
    });

    nextBtn.addEventListener('click', function() {
      loadTrack(current + 1, playing);
    });

    playPauseBtn.addEventListener('click', togglePlay);

    /* ── Keyboard shortcuts — desktop + tablet only ── */
    var _lastLeftKey = 0;
    document.addEventListener('keydown', function(e) {
      if (window.innerWidth <= 639) return;
      if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
      if (e.key === 'ArrowRight') {
        e.preventDefault();
        loadTrack(current + 1, playing);
      } else if (e.key === 'ArrowLeft') {
        e.preventDefault();
        var now = Date.now();
        var isDouble = (now - _lastLeftKey) < 300;
        _lastLeftKey = now;
        if (isDouble || audio.currentTime <= 5) {
          loadTrack(current - 1, playing);
          _lastLeftKey = 0;
        } else {
          audio.currentTime = 0;
        }
      }
    });

    /* ── Start: load track 1, attempt autoplay ── */
    loadTrack(0, true);

    /* Expose pause/resume for break coordination */
    var _musicWasPlaying = false;
    window._pauseMusicForBreak = function() {
      _musicWasPlaying = playing;
      if (playing) { audio.pause(); playing = false; setPlayIcon(false); }
    };
    window._resumeMusicAfterBreak = function() {
      if (_musicWasPlaying) {
        audio.play().then(function() {
          playing = true;
          setPlayIcon(true);
        }).catch(function() {});
        _musicWasPlaying = false;
      }
    };
  })();


</script>
